{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "operator.name" . }}-operator
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "operator.resourceName" (dict "suffix" "monarchmesh-admin-role" "context" $) }}
rules:
- apiGroups:
  - monarch.pytorch.org
  resources:
  - monarchmeshes
  verbs:
  - '*'
- apiGroups:
  - monarch.pytorch.org
  resources:
  - monarchmeshes/status
  verbs:
  - get
{{- end }}
