---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resourceNames:
  - monarchmeshes.monarch.pytorch.org
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - update
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monarch.pytorch.org
  resources:
  - monarchmeshes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monarch.pytorch.org
  resources:
  - monarchmeshes/finalizers
  verbs:
  - update
- apiGroups:
  - monarch.pytorch.org
  resources:
  - monarchmeshes/status
  verbs:
  - get
  - patch
  - update
